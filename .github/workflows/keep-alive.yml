name: Keep Render Awake

on:
  schedule:
    - cron: '*/14 * * * *'   # toutes les 14 minutes
  workflow_dispatch:           # déclenchement manuel possible

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping NjangiMarket
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://njangimarket.onrender.com/ping)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::App a répondu avec le code $STATUS"
          fi
